<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/stylehome.css">
    <title>Home</title>
</head>

<body>

    <header>
        <img src="./images/image.svg" alt="Logo TTwitter" class="logo-ttwitter" style="margin-left: 2%; background: none;">
        <img src="./images/busca.svg" alt="Campo de Busca" class="busca-ttwitter" style="width: 40%; background: none;">
    </header>

    <div class="home">
        <nav>
            <img src="./images/home.svg" alt="Página inicial" class="home-ttwitter">
            <img src="./images/notificacao.svg" alt="Notificações" class="notificacao-ttwitter">
            <img src="./images/mensagens.svg" alt="Mensagens" class="mensagens-ttwitter">
            <img src="./images/config.svg" alt="Configurações" class="config-ttwitter">
        </nav>

        <main>
            <form>
                <input type="text" class="input-formulario-post" placeholder="No que você está pensando...?">
                <div class="div-ferramentas-botao">
                    <img src="./images/ferramentas-form.svg" alt="Ferramentas de Postagem" class="ferramentas-form" style="width: 20%; background: none;">
                    <button type="submit" class="botao-postar">Postar</button>
                </div>
            </form>
            <section>
                <img src="./images/image-post.svg" alt="Foto da Postagem" class="image-post">
                <div class="info-post">
                    <img src="./images/fotoperfil.svg" alt="Foto do Usuário" class="foto-usuario">
                    <label class="label-formulario-usuario" style="font-weight: bold;">@usuario</label>
                    <img src="./images/insights-post.svg" alt="Insights" class="insights-post">
                </div>
                <label class="label-descricao-post">Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum</label>
            </section>
        </main>

        <article>
            <label class="label-recomendacao">Pessoas que você talvez conheça</label>
            <div class="usuario-recomendacao">
                <img src="./images/fotoperfil.svg" alt="Foto do Usuário" class="foto-usuario">
                <label class="label-formulario-usuario"> @usuario</label>
                <button type="button" class="botao-adicionar">Adicionar</button>
            </div>
            <div class="usuario-recomendacao">
                <img src="./images/fotoperfil.svg" alt="Foto do Usuário" class="foto-usuario">
                <label class="label-formulario-usuario"> @usuario</label>
                <button type="button" class="botao-adicionar">Adicionar</button>
            </div>
            <div class="usuario-recomendacao">
                <img src="./images/fotoperfil.svg" alt="Foto do Usuário" class="foto-usuario">
                <label class="label-formulario-usuario"> @usuario</label>
                <button type="button" class="botao-adicionar">Adicionar</button>
            </div>
        </article>
    </div>
</body>

</html>
