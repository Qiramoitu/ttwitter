<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/stylelogin.css">
    <title>Login TTwitter</title>
</head>
<body>

    <div class="container">
        <img src="./images/image.svg" alt="Logo TTwitter" class="logo-ttwitter">

        <form class="login" action="">
            <label class="label-formulario-h1">Bem vindo a plataforma TTwitter</label>
            <label for="email" class="label-formulario-email">Email</label>
            <input class="input-formulario-email" type="email" id="email" name="email" placeholder="example@email.com" required>
            <br>
            <label for="senha" class="label-formulario-senha">Senha</label>
            <input class="input-formulario-senha" type="password" id="senha" name="senha" placeholder="*******" required><br>
            <a href="esqueci.html" class="esqueci-senha">Esqueci minha senha</a><br>
            <button type="button" class="botao-entrar"><a href="home.html" class="botao-entrar" style="text-decoration: none; color: inherit;">Entrar</a></button>
            <a href="cadastro.html" class="botao-cadastro">Registrar</a>
            <label class="label-formulario-termos">
                Li e estou de acordo com os <a href="termos.html">Termos</a> e <a href="condicao.html">Condições de Uso</a>
            </label>
        </form>
    </div>
</body>
</html>
